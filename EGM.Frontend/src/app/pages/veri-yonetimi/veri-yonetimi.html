<div class="veri-container">

  <div style="display:flex;justify-content:flex-end;margin-bottom:10px">
    <button class="btn-yenile" (click)="verileriGetir()">
      <span *ngIf="!yukleniyor">&#8635; Yenile</span>
      <span *ngIf="yukleniyor" class="spinner"></span>
    </button>
  </div>

  <!-- HATA -->
  <div class="alert alert-hata" *ngIf="hata">{{ hata }}</div>

  <!-- ÖZET KARTLAR -->
  <div class="ozet-izgarasi">
    <div class="ozet-kart" *ngFor="let o of ozet" [style.border-left-color]="o.renk">
      <div class="ozet-sayi" [style.color]="o.renk">
        <span *ngIf="yukleniyor" class="spinner-kucuk"></span>
        <span *ngIf="!yukleniyor">{{ o.sayi }}</span>
      </div>
      <div class="ozet-tur">{{ o.tur }}</div>
    </div>
  </div>

  <!-- TOPLAM -->
  <div class="toplam-satir">
    <span class="toplam-etiket">Toplam Olay Kaydı</span>
    <span class="toplam-sayi">{{ toplamKayit() }}</span>
  </div>

  <!-- MODÜLLER -->
  <h2 class="bolum-baslik">Veri Modülleri</h2>
  <div class="modul-izgarasi">
    <div class="modul-kart" *ngFor="let a of alanlar" [routerLink]="a.route" [style.--accent]="a.renk">
      <div class="modul-renk-serit" [style.background]="a.renk"></div>
      <div class="modul-icerik">
        <div class="modul-ust">
          <span class="modul-etiket" [style.background]="a.renk + '22'" [style.color]="a.renk">{{ a.etiket }}</span>
        </div>
        <div class="modul-baslik">{{ a.baslik }}</div>
        <div class="modul-aciklama">{{ a.aciklama }}</div>
        <div class="modul-git">Gözat <span class="git-ok">→</span></div>
      </div>
    </div>
  </div>

</div>
