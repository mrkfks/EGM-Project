<div class="veri-container">

  <!-- HATA -->
  <div class="alert alert-hata" *ngIf="hata">{{ hata }}</div>

  <!-- VERİ GİRİŞLERİ TABLOSU -->
  <div class="tablo-blok">
    <div class="tablo-ust">
      <h2 class="bolum-baslik" style="margin:0">Veri Girişleri</h2>
      <input class="arama-kutusu" type="text" [(ngModel)]="aramaMetni"
             placeholder="Sicil, ad, birim, konu, form ile ara..." />
    </div>

    <div class="tablo-sarici">
      <div *ngIf="tabloYukleniyor" class="tablo-yukle">
        <span class="spinner-kucuk"></span> Yükleniyor...
      </div>

      <table class="veri-tablo" *ngIf="!tabloYukleniyor">
        <thead>
          <tr>
            <th>Sicil</th>
            <th>Ad Soyad</th>
            <th>Birim</th>
            <th>Tarih</th>
            <th>Form</th>
            <th>Konu</th>
            <th>Detay</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let v of filtrelenmis">
            <td><span class="sicil-rozet">{{ v.sicil }}</span></td>
            <td class="ad-hucre">{{ v.adSoyad }}</td>
            <td class="birim-hucre">{{ v.birim || '-' }}</td>
            <td class="tarih-hucre">{{ tarihFormat(v.tarih) }}</td>
            <td><span class="kaynak-rozet">{{ v.kaynak }}</span></td>
            <td>{{ v.konu }}</td>
            <td>{{ v.faaliyet }}</td>
          </tr>
          <tr *ngIf="filtrelenmis.length === 0">
            <td colspan="7" class="bos-satir">Kayıt bulunamadı.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</div>
