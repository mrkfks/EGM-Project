<div class="harita-container">
  <!-- Harita -->
  <div #mapContainer class="map-wrapper"></div>

  <!-- Filtreleme Paneli (Haritanın Altında) -->
  <div class="harita-controls-bottom">
    <app-harita-control-panel
      [provinces]="provinces"
      [isLoading]="isLoading"
      [errorMessage]="errorMessage"
      (filterApplied)="onFilterApplied($event)"
      (reset)="onReset()"
    ></app-harita-control-panel>
  </div>
</div>
