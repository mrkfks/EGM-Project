<aside class="egm-sidebar" [class.sb-open]="isOpen" *ngIf="show">

  <!-- ── Marka / Logo ─────────────────────────── -->
  <div class="sb-brand">
    <img src="logo.png" alt="EGM" class="sb-logo" onerror="this.style.display='none'">
    <div class="sb-brand-text">
      <span class="sb-brand-name">EGM</span>
      <span class="sb-brand-sub">Güvenlik Yönetim Sistemi</span>
    </div>
  </div>

  <!-- ── Nav Grupları ─────────────────────────── -->
  <nav class="sb-nav">
    <ng-container *ngFor="let group of visibleGroups()">
      <div class="sb-group-label" *ngIf="group.title">{{ group.title }}</div>
      <ul class="sb-list">
        <li *ngFor="let item of group.items">
          <a class="sb-link" [routerLink]="item.route" [class.active]="isActive(item.route)" (click)="closeSidebar()">
            <!-- MAP -->
            <svg *ngIf="item.icon==='map'" class="sb-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/>
              <line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/>
            </svg>
            <!-- FILE-TEXT / BÜLTENler -->
            <svg *ngIf="item.icon==='file-text'" class="sb-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
              <line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>
              <line x1="10" y1="9" x2="8" y2="9"/>
            </svg>
            <!-- BAR-CHART / KURULUŞ İSTATİSTİK -->
            <svg *ngIf="item.icon==='bar-chart'" class="sb-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="20" x2="18" y2="10"/>
              <line x1="12" y1="20" x2="12" y2="4"/>
              <line x1="6" y1="20" x2="6" y2="14"/>
              <line x1="2" y1="20" x2="22" y2="20"/>
            </svg>
            <!-- PIE-CHART / KONU İSTATİSTİK -->
            <svg *ngIf="item.icon==='pie-chart'" class="sb-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21.21 15.89A10 10 0 1 1 8 2.83"/>
              <path d="M22 12A10 10 0 0 0 12 2v10z"/>
            </svg>
            <!-- TRENDING-UP / SOKAK İSTATİSTİK -->
            <svg *ngIf="item.icon==='trending-up'" class="sb-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/>
              <polyline points="17 6 23 6 23 12"/>
            </svg>
            <!-- HASH / SOSYAL MEDYA İSTATİSTİK -->
            <svg *ngIf="item.icon==='hash'" class="sb-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="4" y1="9" x2="20" y2="9"/><line x1="4" y1="15" x2="20" y2="15"/>
              <line x1="10" y1="3" x2="8" y2="21"/><line x1="16" y1="3" x2="14" y2="21"/>
            </svg>
            <!-- CHECK-SQUARE / SEÇİM İSTATİSTİK -->
            <svg *ngIf="item.icon==='check-square'" class="sb-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="9 11 12 14 22 4"/>
              <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
            </svg>
            <!-- USER-CHECK / ZİYARETÇİ İSTATİSTİK -->
            <svg *ngIf="item.icon==='user-check'" class="sb-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
              <circle cx="8.5" cy="7" r="4"/>
              <polyline points="17 11 19 13 23 9"/>
            </svg>
            <!-- ALERT / EVENT -->
            <svg *ngIf="item.icon==='alert'" class="sb-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
              <line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
            </svg>
            <!-- ACTIVITY / OPERATIONAL -->
            <svg *ngIf="item.icon==='activity'" class="sb-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
            </svg>
            <!-- SHARE / SOCIAL MEDIA -->
            <svg *ngIf="item.icon==='share'" class="sb-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
              <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
            </svg>
            <!-- SEARCH-PERSON / SUPHELI -->
            <svg *ngIf="item.icon==='search-person'" class="sb-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="9" cy="7" r="4"/><path d="M3 21v-1a8 8 0 0 1 11.32-7.27"/>
              <circle cx="19" cy="19" r="3"/><line x1="21.5" y1="21.5" x2="23" y2="23"/>
            </svg>
            <!-- ORG / ORGANIZATOR -->
            <svg *ngIf="item.icon==='org'" class="sb-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="2" y="15" width="6" height="5" rx="1"/><rect x="9" y="15" width="6" height="5" rx="1"/>
              <rect x="16" y="15" width="6" height="5" rx="1"/>
              <rect x="7" y="4" width="10" height="5" rx="1"/>
              <line x1="5" y1="15" x2="5" y2="9"/><line x1="19" y1="15" x2="19" y2="9"/>
              <line x1="12" y1="15" x2="12" y2="9"/><line x1="5" y1="9" x2="19" y2="9"/>
            </svg>
            <!-- VOTE / SECIM -->
            <svg *ngIf="item.icon==='vote'" class="sb-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
            </svg>
            <!-- STAR / VIP FORM -->
            <svg *ngIf="item.icon==='star'" class="sb-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
            </svg>
            <!-- USERS / KULLANICI -->
            <svg *ngIf="item.icon==='users'" class="sb-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
              <circle cx="9" cy="7" r="4"/>
              <path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
            </svg>
            <!-- BUILDING / KURULUŞ YÖNETİM -->
            <svg *ngIf="item.icon==='building'" class="sb-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="3 9.5 12 2 21 9.5"/>
              <line x1="19" y1="22" x2="19" y2="9.5"/>
              <line x1="5" y1="22" x2="5" y2="9.5"/>
              <line x1="3" y1="22" x2="21" y2="22"/>
              <rect x="9" y="14" width="6" height="8"/>
            </svg>
            <!-- BOOK / KONU YÖNETİM -->
            <svg *ngIf="item.icon==='book'" class="sb-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
              <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
            </svg>
            <!-- DATABASE / VERI YONETIMI -->
            <svg *ngIf="item.icon==='database'" class="sb-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <ellipse cx="12" cy="5" rx="9" ry="3"/>
              <path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/>
              <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/>
            </svg>
            <!-- CALENDAR / AJANDA -->
            <svg *ngIf="item.icon==='calendar'" class="sb-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
              <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
              <line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
            <!-- SETTINGS / YONETIM PANELI -->
            <svg *ngIf="item.icon==='settings'" class="sb-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="3"/>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
            <!-- BRIEFCASE / FAALIYET YONETIMI -->
            <svg *ngIf="item.icon==='briefcase'" class="sb-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="2" y="7" width="20" height="14" rx="2" ry="2"/>
              <path d="M16 7V5a2 2 0 0 0-2-2H10a2 2 0 0 0-2 2v2"/>
            </svg>
            <span class="sb-label">{{ item.label }}</span>
          </a>
        </li>
      </ul>
    </ng-container>
  </nav>

  <div class="sb-spacer"></div>
  <div class="sb-footer">
    <span class="sb-version">v1.0 &bull; EGM &copy; 2026</span>
  </div>

</aside>

<!-- Overlay für mobile drawer -->
<div class="sb-overlay" [class.sb-overlay-visible]="isOpen && isMobile" (click)="closeSidebar()"></div>
