<header class="egm-navbar" *ngIf="show">

  <!-- Sol: Logo + Brand -->
  <div class="nb-left">
    <img src="logo.png" alt="EGM" class="nb-logo" onerror="this.style.display='none'">
    <div class="nb-title-group">
      <span class="nb-title">EGM Proje</span>
      <span class="nb-subtitle">Güvenlik Yönetim Sistemi</span>
    </div>
  </div>

  <!-- Sağ: Bildirimler + Kullanıcı -->
  <div class="nb-right">
    <!-- Bildirim Merkezi -->
    <app-notification-center></app-notification-center>

    <!-- Kullanıcı dropdown -->
    <div class="nb-user" (click)="toggleDropdown()" [class.open]="dropdownOpen">
      <div class="nb-avatar">{{ initials }}</div>
      <div class="nb-user-info">
        <span class="nb-user-name">{{ userName }}</span>
        <span class="nb-user-role">{{ roleLabel }}</span>
      </div>
      <svg class="nb-caret" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="6 9 12 15 18 9"/>
      </svg>

      <!-- Dropdown menü -->
      <div class="nb-dropdown" *ngIf="dropdownOpen" (click)="$event.stopPropagation()">
        <div class="nb-dd-header">
          <div class="nb-dd-avatar">{{ initials }}</div>
          <div>
            <div class="nb-dd-name">{{ userName }}</div>
            <div class="nb-dd-email">{{ userEmail }}</div>
          </div>
        </div>
        <div class="nb-dd-divider"></div>
        <button class="nb-dd-item nb-dd-logout" (click)="logout()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          Çıkış Yap
        </button>
      </div>
    </div>
  </div>

</header>
